[[sections]]
title = "课程建议"

[[sections.items]]
content = """
**工作量与回报**

名义上 240 学时。工作量完全取决于导师个人要求，不同组之间差异巨大——有的组全程相对轻松，有的组开题阶段即需高强度投入。

正因投入巨大，如果最终课题成果无法转化为简历上的亮点（论文、竞赛、项目经历等），这门课就成了一笔极大的负资产——240 学时换 2 学分，回报率极低。建议从一开始就以"能写进简历"的标准推进，主动与导师沟通争取有含金量的产出。

**关于通过率**

评分标准不透明，但从往届情况看，只要持续投入、认真推进课题，基本不会挂科。但消极应付、公开抨击课程会带来不必要的麻烦，建议专注于课题本身。

**选题与导师**

- 双选实质是先到先得。导师名额有限，组队拖到后期的学生可能面临无课题可选的风险
- 无官方调剂机制。若最终未能选定导师，无法正常完成课程
- 不同导师的投入程度和指导风格差异极大：有的全程紧盯，有的很难联系上。建议选导师前多方打听往届体验
- 课题方向偏向研究生层次（3D 重建、多模态感知、通信感知一体化、大模型架构等），大二学生需大量额外学习。**尤其注意马帅老师的两个通信相关课题（波束赋形、通信资源分配），不建议选择**。人工智能班的课程体系里，大二秋学复变函数，大二春学信号与系统，而通信原理是通信方向的大三春专业限选课——按正常节奏，结题答辩（大二夏）结束一年后才能学到。没有通信原理基础直接做波束赋形和通信资源分配，相当于跳过了整个知识体系的中层。这不是学生努力就能弥补的差距——课程排课本身符合学科规律，问题出在课题时间线与知识储备完全不匹配。

**答辩**

三轮答辩均需前往鹏城实验室，形式为 5 分钟限时汇报 + 不限时专家批评。评委风格严厉，当众指出问题，心理压力较大。建议提前充分准备，对评委提问有合理预期。

**队友**

两人组队绑定一整个学年，且为必修课无人可中途退出。组队前务必确认对方靠谱，避免因分工不均导致全年摩擦。班级人数为偶数，理论上不会落单，但组队信息不对称（以为已和某人组队但对方实际另有选择）时有发生，建议尽早确认并锁定队友。

**鹏城实验室**

- 通勤：打车约 30 分钟（不堵车），地铁约 1 小时
- 网络：不认外来学生账号，课题期间网络使用可能受限
- 门禁：需办理电子门禁（提前准备一寸照片）。门禁系统稳定性一般

**费用**

课程不提供任何正规报销，包括但不限于：AI 模型调用费用、云端集群租赁费用、往返鹏城实验室的交通费（打车/地铁）。不确定个别课题组是否会自行承担，建议选题后向导师确认。

**集中培训**

共 2 次，每次约 2 小时。内容涵盖计算机基础、CPU/GPU 架构、Python、PyTorch、学校算力资源等——每个主题本身都很庞大，2 小时只能浅尝辄止。对有编程和深度学习基础的同学帮助有限。
"""
author = { name = "aqua", link = "https://github.com/marine-aqua", date = "2026-07" }

