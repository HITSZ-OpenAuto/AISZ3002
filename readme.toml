[[sections]]
title = "课程形式与选题"

[[sections.items]]
content = """
**集中培训**

共 2 次，内容涵盖计算机基础、CPU/GPU 架构、Python 语法、PyTorch 使用、Git、学校算力资源申请等。培训时间由课程组通知。

**选题与组队**

- 2 人组队。学生自行组队后，准备个人简历联系意向导师，导师考察后确认组员名单
- 只能从课程组发布的候选课题中选择，每位导师至少指导一组
- 导师基本来自鹏城实验室
- **实质上是先到先得**：导师名额有限，满员后不再接收。无官方调剂机制，未能在截止前确定导师视为选题失败

